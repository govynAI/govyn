<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L10,5 L0,9z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Agent Box -->
  <rect x="10" y="45" width="170" height="190" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="95" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#1E40AF">Your Agent</text>
  <line x1="35" y1="94" x2="155" y2="94" stroke="#3B82F6" stroke-opacity="0.2"/>
  <text x="95" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">Sends requests</text>
  <text x="95" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">to proxy URL</text>
  <text x="95" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94A3B8" font-style="italic">(no real API key)</text>

  <!-- Proxy Box -->
  <rect x="290" y="5" width="300" height="270" rx="12" fill="#FAF5FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="440" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="19" fill="#6D28D9">Govyn Proxy</text>
  <line x1="310" y1="50" x2="570" y2="50" stroke="#7C3AED" stroke-opacity="0.2"/>

  <!-- Step 1 -->
  <circle cx="325" cy="78" r="11" fill="#EDE9FE"/>
  <text x="325" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">1</text>
  <text x="345" y="83" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Auth</text>

  <!-- Step 2 -->
  <circle cx="325" cy="113" r="11" fill="#EDE9FE"/>
  <text x="325" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">2</text>
  <text x="345" y="118" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Policy Evaluation</text>

  <!-- Step 3 -->
  <circle cx="325" cy="148" r="11" fill="#EDE9FE"/>
  <text x="325" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">3</text>
  <text x="345" y="153" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Budget Check</text>

  <!-- Step 4 -->
  <circle cx="325" cy="183" r="11" fill="#EDE9FE"/>
  <text x="325" y="187" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">4</text>
  <text x="345" y="188" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Loop Detection</text>

  <!-- Step 5 -->
  <circle cx="325" cy="218" r="11" fill="#EDE9FE"/>
  <text x="325" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">5</text>
  <text x="345" y="223" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Smart Routing</text>

  <!-- Step 6 -->
  <circle cx="325" cy="253" r="11" fill="#EDE9FE"/>
  <text x="325" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">6</text>
  <text x="345" y="258" font-family="Arial,sans-serif" font-size="13" fill="#1E293B">Forward &amp; Log</text>

  <!-- Provider Box -->
  <rect x="700" y="45" width="170" height="190" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="785" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="15" fill="#047857">LLM Providers</text>
  <line x1="725" y1="94" x2="845" y2="94" stroke="#10B981" stroke-opacity="0.2"/>
  <text x="785" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">OpenAI</text>
  <text x="785" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">Anthropic</text>
  <text x="785" y="164" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">Google</text>
  <text x="785" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#475569">Mistral</text>

  <!-- Arrows with flowing dash animation -->

  <!-- Agent to Proxy -->
  <line x1="182" y1="120" x2="287" y2="120" stroke="#64748B" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="234" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B" font-weight="bold">proxy URL</text>

  <!-- Proxy to Agent -->
  <line x1="287" y1="160" x2="182" y2="160" stroke="#64748B" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="234" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94A3B8">response</text>

  <!-- Proxy to Provider -->
  <line x1="592" y1="120" x2="697" y2="120" stroke="#64748B" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="644" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B" font-weight="bold">real API key</text>

  <!-- Provider to Proxy -->
  <line x1="697" y1="160" x2="592" y2="160" stroke="#64748B" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="644" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94A3B8">response</text>
</svg>
