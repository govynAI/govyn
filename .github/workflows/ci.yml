name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose
      - name: Upload test results
        if: always() && hashFiles('test-results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/

  dashboard-build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --prefix dashboard ci
      - run: npm --prefix dashboard run build

  python-sdk:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python-sdk[dev]"
      - run: python -m pip install build twine
      - run: python -m pytest python-sdk/tests -q
      - run: python -m build python-sdk --outdir python-sdk/dist
      - run: python -m twine check python-sdk/dist/*

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: ls -la dist/ && test -f dist/cli.js && test -f dist/index.js

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t govyn:ci .
      - name: Check image size
        run: |
          SIZE=$(docker image inspect govyn:ci --format='{{.Size}}')
          MB=$((SIZE / 1048576))
          echo "Image size: ${MB}MB"
          if [ "$MB" -gt 150 ]; then
            echo "FAIL: Image exceeds 150MB"
            exit 1
          fi
      - name: Smoke test
        run: |
          docker run --rm govyn:ci --help

  publish-docker:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, build, docker, dashboard-build, python-sdk]
    env:
      HAS_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' }}
      HAS_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
      - if: env.HAS_DOCKERHUB_USERNAME == 'true' && env.HAS_DOCKERHUB_TOKEN == 'true'
        name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - if: env.HAS_DOCKERHUB_USERNAME == 'true' && env.HAS_DOCKERHUB_TOKEN == 'true'
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: govyn/govyn:${{ github.ref_name }},govyn/govyn:latest
      - if: env.HAS_DOCKERHUB_USERNAME != 'true' || env.HAS_DOCKERHUB_TOKEN != 'true'
        name: Skip Docker publish
        run: echo "Docker Hub credentials not configured; skipping image publish."
