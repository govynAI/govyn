<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L10,5 L0,9z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Agent Box -->
  <rect x="10" y="45" width="170" height="190" rx="12" fill="#1E3A5F" stroke="#60A5FA" stroke-width="2"/>
  <text x="95" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#93C5FD">Your Agent</text>
  <line x1="35" y1="94" x2="155" y2="94" stroke="#60A5FA" stroke-opacity="0.25"/>
  <text x="95" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">Sends requests</text>
  <text x="95" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">to proxy URL</text>
  <text x="95" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748B" font-style="italic">(no real API key)</text>

  <!-- Proxy Box -->
  <rect x="290" y="5" width="300" height="270" rx="12" fill="#2E1065" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="440" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="19" fill="#C4B5FD">Govyn Proxy</text>
  <line x1="310" y1="50" x2="570" y2="50" stroke="#A78BFA" stroke-opacity="0.25"/>

  <!-- Step 1 -->
  <circle cx="325" cy="78" r="11" fill="#4C1D95"/>
  <text x="325" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">1</text>
  <text x="345" y="83" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Auth</text>

  <!-- Step 2 -->
  <circle cx="325" cy="113" r="11" fill="#4C1D95"/>
  <text x="325" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">2</text>
  <text x="345" y="118" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Policy Evaluation</text>

  <!-- Step 3 -->
  <circle cx="325" cy="148" r="11" fill="#4C1D95"/>
  <text x="325" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">3</text>
  <text x="345" y="153" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Budget Check</text>

  <!-- Step 4 -->
  <circle cx="325" cy="183" r="11" fill="#4C1D95"/>
  <text x="325" y="187" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">4</text>
  <text x="345" y="188" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Loop Detection</text>

  <!-- Step 5 -->
  <circle cx="325" cy="218" r="11" fill="#4C1D95"/>
  <text x="325" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">5</text>
  <text x="345" y="223" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Smart Routing</text>

  <!-- Step 6 -->
  <circle cx="325" cy="253" r="11" fill="#4C1D95"/>
  <text x="325" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C4B5FD">6</text>
  <text x="345" y="258" font-family="Arial,sans-serif" font-size="13" fill="#E2E8F0">Forward &amp; Log</text>

  <!-- Provider Box -->
  <rect x="700" y="45" width="170" height="190" rx="12" fill="#14532D" stroke="#4ADE80" stroke-width="2"/>
  <text x="785" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="15" fill="#86EFAC">LLM Providers</text>
  <line x1="725" y1="94" x2="845" y2="94" stroke="#4ADE80" stroke-opacity="0.25"/>
  <text x="785" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">OpenAI</text>
  <text x="785" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">Anthropic</text>
  <text x="785" y="164" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">Google</text>
  <text x="785" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CBD5E1">Mistral</text>

  <!-- Arrows with flowing dash animation -->

  <!-- Agent to Proxy -->
  <line x1="182" y1="120" x2="287" y2="120" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="234" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94A3B8" font-weight="bold">proxy URL</text>

  <!-- Proxy to Agent -->
  <line x1="287" y1="160" x2="182" y2="160" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="234" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B">response</text>

  <!-- Proxy to Provider -->
  <line x1="592" y1="120" x2="697" y2="120" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="644" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94A3B8" font-weight="bold">real API key</text>

  <!-- Provider to Proxy -->
  <line x1="697" y1="160" x2="592" y2="160" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="644" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B">response</text>
</svg>
