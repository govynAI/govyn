version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      test:
        patterns:
          - "vitest"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "typescript"
          - "@types/*"
          - "vitest"

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      codemirror:
        patterns:
          - "@codemirror/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@radix-ui/*"
          - "@codemirror/*"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "pip"
    directory: "/python-sdk"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
